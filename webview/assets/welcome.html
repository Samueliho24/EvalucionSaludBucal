<!DOCTYPE html>
<html>
<head>
	<meta name="viewport" content="initial-scale=1, width=device-width">
	<meta charset="UTF-8">
	<link rel="stylesheet" href="style.css"/>
</head>
<body id=welcome>
	<div id=welcome-card>
		<div class=logo-row>
			<img src="escudo_de_luz.png" />
			<img src="LOGO ODONTOLOGIA.png" />
		</div>

		<h1>Bienvenido</h1>
		<p class=user-name content=name></p>
		<p class=system-name>Sistema de Evaluaci&oacute;n de Salud Bucal</p>

		<div class=action-group>
			<button onclick="document.getElementById('modal-forms').style.display='flex'" class="btn btn-primary">Formulario</button>
			<button onclick="Android.export()" class="btn btn-secondary">Exportar Datos</button>
			<p class=record-count>Registros por Exportar: <span content=count></span></p>
		</div>

		<div id="modal-forms" class="modal-overlay">
			<div class="modal-card">
				<h2>Seleccionar Formulario</h2>
				<a href="form.html" class="btn btn-primary">Salud Bucal</a>
				<a href="socioeconomico.html" class="btn btn-primary">Socioeconómico</a>
				<button onclick="document.getElementById('modal-forms').style.display='none'" class="btn btn-tertiary">Cancelar</button>
			</div>
		</div>

		<a href="#" class="btn btn-emergency" style="display:none">Extracci&oacute;n Local</a>

		<a href="info.html?from=welcome" class="btn btn-info">Acerca de</a>

		<hr class=divider>

		<a href="login.html" class="btn btn-tertiary">Cerrar Sesi&oacute;n</a>

		<div class=card-footer>&copy; 2026 Departamento de Tecnolog&iacute;a, Informaci&oacute;n y Comunicaci&oacute;n</div>
	</div>
	<script>
		[...document.querySelectorAll("[content]")].forEach(x => x.textContent = Android.getvar(x.getAttribute("content")));
		if (Android.getvar("cedula") === "1")
			document.querySelector(".btn-emergency").style.display = "flex";
	</script>
</body>
